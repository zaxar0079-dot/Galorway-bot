services:
  - type: web
    name: galorway-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bot:flask_app --bind 0.0.0.0:$PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        value: https://galorway-bot.onrender.com
      - key: PORT
        value: 10000
